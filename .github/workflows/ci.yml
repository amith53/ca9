name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ruff
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/

  skylos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install skylos==3.5.1
      - name: Patch skylos 3.5.1 missing engines module
        run: |
          python -c "
          import pathlib, importlib.util
          spec = importlib.util.find_spec('skylos.visitors.languages.go.go')
          if spec and spec.origin:
              p = pathlib.Path(spec.origin)
              txt = p.read_text()
              if 'try:' not in txt:
                  p.write_text(txt.replace(
                      'from skylos.engines.go_runner import run_go_engine_for_module',
                      'try:\n    from skylos.engines.go_runner import run_go_engine_for_module\nexcept ModuleNotFoundError:\n    run_go_engine_for_module = None'))
          "
      - run: skylos src/ --json
